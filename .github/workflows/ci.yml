name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,oracle,docs]"
      - name: Format check
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src
      - name: Version consistency
        run: python scripts/check-version-consistency.py
      - name: Dependency manifest consistency
        run: python scripts/update-dependency-manifests.py --check
      - name: Local backlog item validation
        run: python scripts/sync-backlog-issues.py --check
      - name: Local bug report validation
        run: python scripts/sync-bug-reports.py --check
      - name: Markdown link check
        run: python scripts/check-markdown-links.py
      - name: Unit tests
        run: pytest -m "not integration"
      - name: Sink capability checks
        run: scripts/check-sinks.sh
      - name: Documentation build
        run: scripts/check-docs.sh
      - name: Build
        run: python -m build
      - name: Generate SBOM
        run: scripts/sbom.sh
      - name: Twine check
        run: twine check dist/*.whl dist/*.tar.gz
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ matrix.python-version }}
          path: dist/sbom/*
      - name: Security scan
        run: scripts/security.sh
