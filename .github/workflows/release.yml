name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,oracle,docs]"
      - name: Sink capability checks
        run: scripts/check-sinks.sh
      - name: Documentation build
        run: scripts/check-docs.sh
      - name: Build
        run: python -m build
      - name: Generate SBOM
        run: scripts/sbom.sh
      - name: Generate checksum manifest
        run: python scripts/generate-checksums.py dist
      - name: Check
        run: twine check dist/*.whl dist/*.tar.gz
      - uses: actions/upload-artifact@v7
        with:
          name: distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
      - uses: actions/upload-artifact@v7
        with:
          name: checksum-manifest
          path: |
            dist/SHA256SUMS
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: dist/sbom/*

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: pypi
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: distributions
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs:
      - build
      - publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: distributions
          path: dist
      - uses: actions/download-artifact@v8
        with:
          name: checksum-manifest
          path: dist
      - uses: actions/download-artifact@v8
        with:
          name: sbom
          path: dist/sbom
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/*.whl dist/*.tar.gz dist/SHA256SUMS dist/sbom/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG_NAME" dist/*.whl dist/*.tar.gz dist/SHA256SUMS dist/sbom/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG_NAME" \
              --generate-notes \
              --verify-tag
          fi

  close-released-backlog-issues:
    needs:
      - github-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Close released backlog issues
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python scripts/close-released-backlog-issues.py --repo "$GITHUB_REPOSITORY" --release "$TAG_NAME"
          python scripts/close-released-bug-issues.py --repo "$GITHUB_REPOSITORY" --release "$TAG_NAME"
