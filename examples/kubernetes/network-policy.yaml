apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nats-sink-worker-egress
  namespace: nats-sinks
  labels:
    app.kubernetes.io/name: nats-sinks
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nats-sinks
  policyTypes:
    - Egress
  egress:
    # DNS egress is usually required when the NATS service name or destination
    # endpoint is resolved through cluster DNS. Customize the namespace and
    # labels to match your cluster DNS deployment.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Replace this selector with the namespace and pod labels used by your NATS
    # service. For external NATS or Oracle endpoints, use your platform's
    # egress gateway, firewall, or CNI-specific controls.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nats
          podSelector:
            matchLabels:
              app.kubernetes.io/name: nats
      ports:
        - protocol: TCP
          port: 4222
