apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-sink-observability-policy
  namespace: nats-sinks
  labels:
    app.kubernetes.io/name: nats-sinks
    app.kubernetes.io/component: observability
data:
  observability.prometheus.json: |
    {
      "schema": "nats_sinks.observability.policy.v1",
      "enabled": false,
      "namespace": "nats_sinks",
      "allowed_metrics": [
        "messages_fetched_total",
        "messages_written_total",
        "messages_acked_total",
        "messages_failed_total",
        "messages_dlq_total",
        "sink_write_errors_total",
        "last_sink_success_epoch_seconds"
      ],
      "allowed_metric_patterns": [],
      "denied_metrics": [],
      "denied_metric_patterns": [],
      "include_observations": false,
      "include_legacy": false,
      "subjects": [],
      "prometheus": {
        "enabled": false,
        "output_file": null,
        "include_help": true,
        "include_type": true,
        "stale_after_seconds": 60,
        "http_endpoint": {
          "enabled": false,
          "host": "0.0.0.0",
          "port": 9108,
          "path": "/metrics",
          "request_timeout_seconds": 5,
          "response_max_bytes": 1048576
        }
      },
      "otlp": {
        "enabled": false,
        "endpoint": null,
        "protocol": "http_json",
        "timeout_seconds": 5,
        "max_retries": 0,
        "retry_backoff_seconds": 0.25,
        "stale_after_seconds": 60,
        "max_request_bytes": 1048576,
        "headers_env": {}
      }
    }
