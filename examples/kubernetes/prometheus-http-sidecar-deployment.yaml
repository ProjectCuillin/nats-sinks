apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats-sink-file-worker-with-prometheus
  namespace: nats-sinks
  labels:
    app.kubernetes.io/name: nats-sinks
    app.kubernetes.io/component: worker-with-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nats-sinks
      app.kubernetes.io/component: worker-with-observability
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats-sinks
        app.kubernetes.io/component: worker-with-observability
      annotations:
        prometheus.io/scrape: "false"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "9108"
    spec:
      serviceAccountName: nats-sink-worker
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 90
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nats-sink
          image: ghcr.io/projectcuillin/nats-sinks:0.4.0
          imagePullPolicy: IfNotPresent
          args:
            - "run"
            - "/etc/nats-sinks/config.json"
          env:
            - name: NATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nats-sink-runtime-secrets
                  key: NATS_PASSWORD
          lifecycle:
            preStop:
              exec:
                command:
                  - "python"
                  - "-c"
                  - "import time; time.sleep(10)"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          volumeMounts:
            - name: config
              mountPath: /etc/nats-sinks/config.json
              subPath: config.json
              readOnly: true
            - name: trust-material
              mountPath: /etc/nats-sinks/tls
              readOnly: true
            - name: event-output
              mountPath: /var/lib/nats-sinks/events
            - name: metrics-snapshot
              mountPath: /var/lib/nats-sinks/metrics
            - name: tmp
              mountPath: /tmp
        - name: nats-sink-observe
          image: ghcr.io/projectcuillin/nats-sinks:0.4.0
          imagePullPolicy: IfNotPresent
          args:
            - "prometheus-http"
            - "/var/lib/nats-sinks/metrics/metrics.json"
            - "/etc/nats-sinks-observability/observability.prometheus.json"
          ports:
            - name: metrics
              containerPort: 9108
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          volumeMounts:
            - name: observability-policy
              mountPath: /etc/nats-sinks-observability/observability.prometheus.json
              subPath: observability.prometheus.json
              readOnly: true
            - name: metrics-snapshot
              mountPath: /var/lib/nats-sinks/metrics
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: nats-sink-file-worker-config
        - name: observability-policy
          configMap:
            name: nats-sink-observability-policy
        - name: trust-material
          secret:
            secretName: nats-sink-trust-material
            optional: true
        - name: event-output
          persistentVolumeClaim:
            claimName: nats-sink-file-events
        - name: metrics-snapshot
          emptyDir:
            sizeLimit: 64Mi
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
