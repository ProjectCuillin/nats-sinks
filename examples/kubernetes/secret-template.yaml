apiVersion: v1
kind: Secret
metadata:
  name: nats-sink-runtime-secrets
  namespace: nats-sinks
  labels:
    app.kubernetes.io/name: nats-sinks
    app.kubernetes.io/component: worker
type: Opaque
stringData:
  # Replace these placeholder values through your cluster secret manager,
  # sealed-secret workflow, external-secrets controller, or deployment pipeline.
  NATS_PASSWORD: "replace-with-runtime-secret"
  ORACLE_PASSWORD: "replace-with-oracle-secret-if-oracle-sink-is-used"
  NATS_SINKS_PAYLOAD_KEY_B64: "replace-with-base64-encoded-32-byte-key-if-encryption-is-used"
---
apiVersion: v1
kind: Secret
metadata:
  name: nats-sink-trust-material
  namespace: nats-sinks
  labels:
    app.kubernetes.io/name: nats-sinks
    app.kubernetes.io/component: trust-material
type: Opaque
stringData:
  # Replace with a non-production CA bundle or credentials-file content only
  # through a secure cluster secret-management workflow.
  ca.crt: "replace-with-ca-certificate-content"
  nats.creds: "replace-with-nats-credentials-file-content-if-used"
