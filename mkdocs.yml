site_name: nats-sinks
site_description: Production-ready outbound sink connectors for NATS JetStream.
site_url: !ENV [NATS_SINKS_DOCS_SITE_URL, READTHEDOCS_CANONICAL_URL, "https://nats-sinks.readthedocs.io/en/latest/"]
repo_url: https://github.com/ProjectCuillin/nats-sinks/
edit_uri: edit/main/docs/
theme:
  name: material
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
